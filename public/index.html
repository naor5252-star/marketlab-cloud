<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"
    />
    <meta name="theme-color" content="#07111d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>MarketLab Local 1.12.0</title>
    <style>
      :root {
        --bg: #07111d;
        --card: #0e1c2b;
        --card2: #142538;
        --text: #eff6ff;
        --muted: #90a3b8;
        --line: #263d54;
        --blue: #56a1ff;
        --good: #4bd5a2;
        --bad: #ff8293;
        --warn: #ffc55c;
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        margin: 0;
        background:
          radial-gradient(circle at top right, #153d65 0, transparent 35%),
          var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        min-height: 100vh;
      }
      .app {
        max-width: 760px;
        margin: auto;
        padding-bottom: 90px;
      }
      .top {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: calc(14px + env(safe-area-inset-top)) 16px 12px;
        background: #07111de6;
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--line);
      }
      .brand {
        font-size: 24px;
        font-weight: 900;
        letter-spacing: -0.05em;
      }
      .sub {
        font-size: 10px;
        color: var(--muted);
        margin-top: 2px;
      }
      .status {
        display: flex;
        gap: 6px;
        align-items: center;
        padding: 7px 9px;
        border-radius: 999px;
        background: #183248;
        font-size: 10px;
        font-weight: 800;
        color: var(--warn);
      }
      .status.online {
        color: var(--good);
        background: #10372e;
      }
      .content {
        padding: 14px;
      }
      .banner {
        padding: 12px 13px;
        border: 1px solid #805f21;
        background: #3b2d16;
        border-radius: 16px;
        color: var(--warn);
        font-size: 11px;
        line-height: 1.45;
        margin-bottom: 12px;
      }
      .tabs {
        display: flex;
        gap: 7px;
        overflow-x: auto;
        padding-bottom: 11px;
        scrollbar-width: none;
      }
      .tabs::-webkit-scrollbar {
        display: none;
      }
      .tabs button {
        flex: 0 0 auto;
        border: 1px solid var(--line);
        background: var(--card);
        color: var(--muted);
        padding: 10px 12px;
        border-radius: 13px;
        font-weight: 850;
      }
      .tabs button.active {
        background: var(--blue);
        border-color: var(--blue);
        color: #06101a;
      }
      .msg {
        display: flex;
        justify-content: space-between;
        padding: 11px 12px;
        border-radius: 13px;
        background: #132e46;
        color: var(--blue);
        font-size: 11px;
        margin-bottom: 11px;
      }
      .stack {
        display: grid;
        gap: 11px;
      }
      .card {
        background: #0e1c2be8;
        border: 1px solid var(--line);
        border-radius: 21px;
        padding: 16px;
        box-shadow: 0 16px 34px #0003;
      }
      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.13em;
        font-size: 9px;
        color: var(--muted);
        font-weight: 900;
      }
      .card h2 {
        font-size: 20px;
        margin: 4px 0 12px;
        letter-spacing: -0.04em;
      }
      .hero h1 {
        font-size: 36px;
        margin: 8px 0;
        letter-spacing: -0.06em;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .muted {
        color: var(--muted);
        font-size: 11px;
      }
      .good {
        color: var(--good);
      }
      .bad {
        color: var(--bad);
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 9px;
      }
      .metric {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 17px;
        padding: 14px;
      }
      .metric strong {
        display: block;
        font-size: 18px;
        margin: 5px 0;
      }
      .metric span {
        font-size: 10px;
        color: var(--muted);
      }
      .list {
        display: grid;
      }
      .item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 0;
        border-bottom: 1px solid var(--line);
      }
      .item:last-child {
        border: 0;
      }
      .avatar {
        width: 39px;
        height: 39px;
        border-radius: 13px;
        background: #17395a;
        color: var(--blue);
        display: grid;
        place-items: center;
        font-size: 11px;
        font-weight: 900;
      }
      .main {
        flex: 1;
      }
      .main strong {
        font-size: 13px;
      }
      .main small {
        display: block;
        color: var(--muted);
        font-size: 10px;
        margin-top: 3px;
      }
      .right {
        text-align: right;
      }
      .right strong {
        font-size: 13px;
      }
      .right small {
        display: block;
        color: var(--muted);
        font-size: 10px;
        margin-top: 3px;
      }
      .form {
        display: grid;
        gap: 11px;
      }
      .field {
        display: grid;
        gap: 6px;
      }
      .field label {
        font-size: 10px;
        color: var(--muted);
        font-weight: 800;
      }
      .field input,
      .field select,
      .field textarea {
        width: 100%;
        border: 1px solid var(--line);
        background: var(--card2);
        color: var(--text);
        padding: 12px;
        border-radius: 13px;
        font-size: 16px;
      }
      .two {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 9px;
      }
      .seg {
        display: grid;
        grid-template-columns: 1fr 1fr;
        background: var(--card2);
        padding: 4px;
        border-radius: 13px;
      }
      .seg button {
        border: 0;
        background: none;
        color: var(--muted);
        padding: 10px;
        border-radius: 10px;
        font-weight: 900;
      }
      .seg .active.buy {
        background: #123b30;
        color: var(--good);
      }
      .seg .active.sell {
        background: #49202a;
        color: var(--bad);
      }
      .btn {
        border: 0;
        border-radius: 13px;
        padding: 13px;
        background: linear-gradient(135deg, var(--blue), #2d7fe7);
        color: #06101a;
        font-weight: 900;
        font-size: 13px;
      }
      .btn.secondary {
        background: var(--card2);
        color: var(--text);
        border: 1px solid var(--line);
      }
      .btn:disabled {
        opacity: 0.45;
      }
      .quote {
        padding: 14px;
        border-radius: 16px;
        background: var(--card2);
        margin-top: 11px;
      }
      .quote h1 {
        font-size: 32px;
        margin: 6px 0;
      }
      .chart {
        width: 100%;
        height: 150px;
        color: var(--blue);
        margin-top: 10px;
      }
      .empty {
        padding: 24px;
        text-align: center;
        color: var(--muted);
        font-size: 12px;
      }
      .warning {
        padding: 10px;
        border-radius: 12px;
        background: #3a2b15;
        color: var(--warn);
        font-size: 11px;
      }
      .nav {
        position: fixed;
        left: 50%;
        bottom: 0;
        transform: translateX(-50%);
        width: min(760px, 100%);
        display: grid;
        grid-template-columns: repeat(9, 1fr);
        padding: 8px 5px calc(8px + env(safe-area-inset-bottom));
        background: #091421ef;
        backdrop-filter: blur(20px);
        border-top: 1px solid var(--line);
      }
      .nav button {
        border: 0;
        background: none;
        color: var(--muted);
        display: grid;
        justify-items: center;
        gap: 3px;
        font-size: 9px;
      }
      .nav button b {
        font-size: 18px;
      }
      .nav button.active {
        color: var(--blue);
      }
      .lesson {
        padding: 12px;
        border-left: 3px solid var(--blue);
        background: var(--card2);
        border-radius: 12px;
        margin-top: 8px;
      }
      .lesson strong {
        font-size: 12px;
      }
      .lesson p {
        font-size: 11px;
        color: var(--muted);
        line-height: 1.5;
        margin: 5px 0 0;
      }
      @media (max-width: 390px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .nav button span {
          font-size: 8px;
        }
      }
      .history-card {
        overflow: hidden;
      }
      .history-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }
      .range-tabs {
        display: flex;
        gap: 5px;
        padding: 4px;
        background: var(--card2);
        border: 1px solid var(--line);
        border-radius: 13px;
      }
      .range-tabs button {
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 8px 10px;
        border-radius: 9px;
        font-size: 11px;
        font-weight: 900;
      }
      .range-tabs button.active {
        background: var(--blue);
        color: #06101a;
      }
      .history-summary {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 7px;
        margin: 12px 0;
      }
      .history-summary div {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 13px;
        background: var(--card2);
      }
      .history-summary span {
        display: block;
        color: var(--muted);
        font-size: 8px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 800;
      }
      .history-summary strong {
        display: block;
        margin-top: 5px;
        font-size: 13px;
      }
      .history-canvas {
        position: relative;
        height: 238px;
        margin: 6px -4px 0;
        touch-action: pan-y;
        user-select: none;
      }
      .history-svg {
        width: 100%;
        height: 100%;
        display: block;
        overflow: visible;
      }
      .history-grid {
        stroke: var(--line);
        stroke-width: 1;
      }
      .history-axis-label {
        fill: var(--muted);
        font-size: 10px;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      }
      .history-line {
        fill: none;
        stroke: var(--good);
        stroke-width: 3.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        vector-effect: non-scaling-stroke;
      }
      .history-line.negative {
        stroke: var(--bad);
      }
      .history-area {
        fill: var(--good);
        opacity: 0.1;
      }
      .history-area.negative {
        fill: var(--bad);
      }
      .chart-crosshair {
        position: absolute;
        top: 13px;
        bottom: 29px;
        width: 1px;
        background: #c8dcf4aa;
        pointer-events: none;
        display: none;
      }
      .chart-dot {
        position: absolute;
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: var(--text);
        border: 3px solid var(--blue);
        transform: translate(-50%, -50%);
        pointer-events: none;
        display: none;
      }
      .chart-tooltip {
        position: absolute;
        z-index: 4;
        min-width: 112px;
        padding: 8px 9px;
        border-radius: 10px;
        background: #06101aeb;
        border: 1px solid var(--line);
        box-shadow: 0 10px 24px #0008;
        pointer-events: none;
        display: none;
      }
      .chart-tooltip strong {
        display: block;
        font-size: 12px;
      }
      .chart-tooltip span {
        display: block;
        color: var(--muted);
        font-size: 9px;
        margin-top: 2px;
      }
      .coverage-note {
        margin-top: 9px;
        padding: 9px 10px;
        border-radius: 11px;
        background: #3a2b15;
        color: var(--warn);
        font-size: 10px;
        line-height: 1.45;
      }
      .history-footer {
        display: flex;
        justify-content: space-between;
        color: var(--muted);
        font-size: 9px;
        margin-top: 3px;
      }
      @media (max-width: 480px) {
        .history-summary {
          grid-template-columns: 1fr 1fr;
        }
        .history-head {
          display: block;
        }
        .range-tabs {
          width: max-content;
          margin-top: 10px;
        }
      }
      .split-marker {
        stroke: var(--warn);
        stroke-width: 1.5;
        stroke-dasharray: 5 4;
        vector-effect: non-scaling-stroke;
      }
      .split-marker-dot {
        fill: var(--warn);
        stroke: #07111d;
        stroke-width: 2;
        vector-effect: non-scaling-stroke;
      }
      .split-events {
        display: grid;
        gap: 7px;
        margin-top: 10px;
      }
      .split-event {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 9px 10px;
        border: 1px solid #805f21;
        background: #3b2d16;
        border-radius: 11px;
        color: var(--warn);
        font-size: 10px;
      }
      .split-event strong {
        font-size: 11px;
      }
      .adjusted-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        margin-top: 5px;
        padding: 5px 8px;
        border-radius: 999px;
        background: #123b30;
        color: var(--good);
        font-size: 9px;
        font-weight: 900;
      }
      .split-warning {
        margin-top: 9px;
        padding: 9px 10px;
        border-radius: 11px;
        background: #351f29;
        color: var(--bad);
        font-size: 10px;
        line-height: 1.45;
      }

      .market-board-head {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 11px;
      }
      .market-board-head .field {
        flex: 1;
      }
      .market-board {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 9px;
      }
      .ticker-card {
        position: relative;
        padding: 12px;
        border: 1px solid var(--line);
        background: var(--card2);
        border-radius: 16px;
        min-width: 0;
      }
      .ticker-card.selected {
        border-color: var(--blue);
        box-shadow: 0 0 0 1px var(--blue) inset;
      }
      .ticker-top {
        display: flex;
        justify-content: space-between;
        gap: 6px;
      }
      .ticker-symbol {
        font-size: 15px;
        font-weight: 950;
      }
      .ticker-remove {
        border: 0;
        background: none;
        color: var(--muted);
        font-size: 16px;
        padding: 0 2px;
      }
      .ticker-price {
        font-size: 21px;
        font-weight: 950;
        margin: 7px 0 2px;
        letter-spacing: -0.04em;
      }
      .ticker-change {
        font-size: 10px;
        font-weight: 850;
      }
      .ticker-position {
        display: flex;
        justify-content: space-between;
        gap: 6px;
        margin: 9px 0;
        color: var(--muted);
        font-size: 9px;
      }
      .ticker-position strong {
        color: var(--text);
      }
      .quick-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .quick-actions button {
        border: 0;
        border-radius: 9px;
        padding: 8px 4px;
        font-size: 10px;
        font-weight: 950;
      }
      .quick-buy {
        background: #123b30;
        color: var(--good);
      }
      .quick-sell {
        background: #49202a;
        color: var(--bad);
      }
      .ticker-open {
        width: 100%;
        border: 0;
        background: none;
        color: var(--blue);
        font-size: 9px;
        font-weight: 850;
        padding: 8px 0 0;
      }
      .board-controls {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        margin-bottom: 11px;
      }
      .board-quantity {
        max-width: 115px;
      }
      .position-side {
        display: inline-flex;
        padding: 3px 6px;
        border-radius: 999px;
        font-size: 8px;
        font-weight: 950;
      }
      .position-side.long {
        background: #123b30;
        color: var(--good);
      }
      .position-side.short {
        background: #49202a;
        color: var(--bad);
      }
      .position-side.flat {
        background: #263d54;
        color: var(--muted);
      }
      .unlimited-note {
        padding: 10px;
        border-radius: 12px;
        background: #132e46;
        color: var(--blue);
        font-size: 10px;
        line-height: 1.45;
        margin-top: 10px;
      }
      .exposure-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 9px;
      }
      .exposure-grid .metric {
        min-width: 0;
      }
      .signed-qty.long {
        color: var(--good);
      }
      .signed-qty.short {
        color: var(--bad);
      }
      @media (max-width: 360px) {
        .market-board {
          grid-template-columns: 1fr;
        }
        .market-board-head {
          display: block;
        }
        .market-board-head .btn {
          width: 100%;
          margin-top: 8px;
        }
      }
      .trade-result {
        display: grid;
        justify-items: end;
        gap: 2px;
        min-width: 104px;
      }
      .trade-result strong {
        font-size: 14px;
      }
      .trade-result small {
        font-size: 9px;
        font-weight: 850;
      }
      .result-kind {
        display: inline-flex;
        margin-top: 4px;
        padding: 4px 7px;
        border-radius: 999px;
        background: #17304a;
        color: var(--blue);
        font-size: 8px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .ticker-pnl {
        margin: 8px 0 9px;
        padding: 8px 9px;
        border-radius: 10px;
        background: #0b1724;
        font-size: 10px;
        font-weight: 900;
      }
      .position-pnl {
        font-weight: 900;
      }
      .trade-price {
        color: var(--muted);
        font-size: 9px;
        margin-top: 3px;
      }
      .trade-fee {
        color: var(--muted);
        font-size: 8px;
        margin-top: 2px;
      }
      .trade-prices {
        display: grid;
        gap: 2px;
        margin-top: 4px;
        color: var(--muted);
        font-size: 9px;
      }
      .trade-prices b {
        color: var(--text);
      }
      .generic-chart {
        position: relative;
        touch-action: pan-y;
        user-select: none;
      }
      .generic-chart .chart {
        display: block;
        width: 100%;
        height: auto;
      }
      .chart-help {
        color: var(--muted);
        font-size: 9px;
        margin-top: 6px;
      }
      .ai-mode {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 9px;
        border-radius: 999px;
        background: #17304a;
        color: var(--blue);
        font-size: 9px;
        font-weight: 900;
      }
      .ai-mode.openai {
        background: #123b30;
        color: var(--good);
      }
      .ai-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .ai-result-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }
      .ai-confidence {
        min-width: 72px;
        text-align: center;
        padding: 10px;
        border-radius: 14px;
        background: var(--card2);
        border: 1px solid var(--line);
      }
      .ai-confidence strong {
        display: block;
        font-size: 20px;
      }
      .ai-confidence span {
        font-size: 8px;
        color: var(--muted);
        text-transform: uppercase;
      }
      .ai-cards {
        display: grid;
        gap: 9px;
      }
      .ai-card {
        padding: 13px;
        border: 1px solid var(--line);
        background: var(--card2);
        border-radius: 15px;
      }
      .ai-card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .ai-card h3 {
        font-size: 14px;
        margin: 0;
      }
      .ai-signal {
        padding: 4px 7px;
        border-radius: 999px;
        font-size: 8px;
        font-weight: 900;
        text-transform: uppercase;
      }
      .ai-signal.positive {
        background: #123b30;
        color: var(--good);
      }
      .ai-signal.negative {
        background: #49202a;
        color: var(--bad);
      }
      .ai-signal.warning {
        background: #3b2d16;
        color: var(--warn);
      }
      .ai-signal.neutral {
        background: #17304a;
        color: var(--blue);
      }
      .ai-card p {
        font-size: 11px;
        line-height: 1.5;
        color: var(--muted);
        margin: 8px 0;
      }
      .ai-evidence {
        display: grid;
        gap: 4px;
        margin: 8px 0;
      }
      .ai-evidence span {
        font-size: 9px;
        color: #c5d7e8;
        padding-left: 12px;
        position: relative;
      }
      .ai-evidence span:before {
        content: "•";
        position: absolute;
        left: 1px;
        color: var(--blue);
      }
      .ai-action {
        padding: 9px;
        border-radius: 10px;
        background: #0a1724;
        color: var(--text);
        font-size: 10px;
        line-height: 1.4;

        function inspect(event) {
          const rect = canvas.getBoundingClientRect(),
            relative = Math.max(
              0,
              Math.min(rect.width, event.clientX - rect.left),
            ),
            plotLeft = (52 / 640) * rect.width,
            plotRight = (12 / 640) * rect.width,
            plotWidth = rect.width - plotLeft - plotRight,
            index = Math.max(
              0,
              Math.min(
                g.points.length - 1,
                Math.round(
                  ((relative - plotLeft) / plotWidth) * (g.points.length - 1),
                ),
              ),
            ),
            point = g.points[index],
            left = (point.x / 640) * rect.width,
            top = (point.y / 238) * rect.height;
          cross.style.display = dot.style.display = tip.style.display = "block";
          cross.style.left = `${left}px`;
          dot.style.left = `${left}px`;
          dot.style.top = `${top}px`;
          tip.querySelector("strong").textContent = money(point.value);
          tip.querySelector("span").textContent =
            `${new Date(point.date + "T00:00:00Z").toLocaleDateString()} · adjusted close`;
          tip.style.left = `${Math.max(5, Math.min(rect.width - 142, left + (left > rect.width * 0.65 ? -140 : 10)))}px`;
          tip.style.top = `${Math.max(5, top - 48)}px`;

          fee = Number(state.settings.commission) || 0;

            side,

            price: px,
            fee,
            provider: q.provider,
            time: new Date().toISOString(),
            journal,
          });
          const trade = state.trades[0];

            const saved = await api("/api/trades", {
              method: "POST",
              headers: { "Content-Type": "application/json" },

            entry = next;
            cash = 0;
            trades++;
          } else if (
            shares &&
            ((pf >= ps && f < slow) ||
              c[i] < entry * 0.93 ||
              c[i] > entry * 1.16)
          ) {
            cash = shares * next;
            shares = 0;
            trades++;
          }
          curve.push(cash + shares * c[i]);
        }
        const final = cash + shares * c.at(-1);
        state.lastBacktest = {
          final,
          returnPct: (final / 100000 - 1) * 100,
          trades,
          curve,
          benchmark: (c.at(-1) / c[30] - 1) * 100,
        };
        save();
        message("Backtest completed with next-bar execution.");
        render();
      }

        const r = state.lastBacktest;
        return `<div class="stack"><section class="card"><div class="eyebrow">Strategy engine</div><h2>SMA 10/30 + exits</h2><p class="muted">Signals use the completed bar; fills occur at the next bar open. Stop loss 7%, take profit 16%.</p><button id="backtest" class="btn">Run backtest</button></section>${r ? `<div class="grid"><div class="metric"><span>Final equity</span><strong>${money(r.final)}</strong><span>${r.returnPct.toFixed(2)}% strategy</span></div><div class="metric"><span>Trades</span><strong>${r.trades}</strong><span>${r.benchmark.toFixed(2)}% benchmark</span></div></div><section class="card">${chart(r.curve)}<div class="warning">Historical simulation is hypothetical and does not predict future returns.</div></section>` : '<section class="card"><div class="empty">Run the strategy after loading market history.</div></section>'}</div>`;

      function research() {
        const q = state.quotes[state.symbol],
          hist = state.history[state.symbol] || [];
        const prices = hist.map((x) => MarketLabHistory.priceValue(x)),
          returns = prices.slice(1).map((x, i) => x / prices[i] - 1);
        const mean = returns.reduce((a, b) => a + b, 0) / (returns.length || 1),
          sd =
            Math.sqrt(
              returns.reduce((a, b) => a + (b - mean) ** 2, 0) /
                (returns.length || 1),
            ) *
            Math.sqrt(252) *
            100;
        const peak = prices.reduce((p, x) => Math.max(p, x), 0),
          dd = q ? (q.price / peak - 1) * 100 : 0;
        return `<div class="stack"><section class="card"><div class="eyebrow">Research center</div><h2>${state.symbol}</h2><p class="muted">Local analysis based only on the loaded price history. No current fundamentals or news are inferred.</p></section><div class="grid"><div class="metric"><span>Annualized volatility</span><strong>${isFinite(sd) ? sd.toFixed(2) : "—"}%</strong><span>Historical estimate</span></div><div class="metric"><span>From history peak</span><strong>${isFinite(dd) ? dd.toFixed(2) : "—"}%</strong><span>Not a forecast</span></div></div><section class="card"><div class="eyebrow">Explainable learning review</div><h2>Risk interpretation</h2><div class="lesson"><strong>Bull case</strong><p>Positive trend persistence may support further gains, but loaded prices alone are insufficient evidence.</p></div><div class="lesson"><strong>Bear case</strong><p>Volatility, concentration, and adverse gaps can produce losses larger than normal daily estimates.</p></div><div class="lesson"><strong>Missing evidence</strong><p>Current earnings, valuation, news, sector exposure, macro data, and licensed real-time quotes.</p></div></section></div>`;
      }

      function settings() {
        return `<div class="stack"><section class="card"><div class="eyebrow">Learning experience</div><h2>Beginner explanations</h2><p class="muted">Keep plain-language screen guides and tappable question marks visible throughout MarketLab.</p><label class="switch-row"><input id="beginnerMode" type="checkbox" ${state.settings?.beginnerMode !== false ? "checked" : ""}><div><strong>Beginner learning mode</strong><span>Show contextual explanations, examples, warnings, and glossary links.</span></div></label><div class="two" style="margin-top:10px"><button class="btn secondary" data-help="glossary">Open glossary</button><button id="restartTour" class="btn secondary">Restart welcome guide</button></div></section><section class="card"><div class="eyebrow">Market data</div><h2>${backendHealth.liveQuotesConfigured ? "Twelve Data current quotes" : "Current quotes not configured"}</h2><p class="muted">${backendHealth.liveQuotesConfigured ? "Refresh all uses Twelve Data. Daily history and splits use " + (backendHealth.historicalDataProvider || "the configured historical provider") + "." : "Add TWELVE_DATA_API_KEY as a Cloudflare Worker secret to enable current prices and Refresh all."}</p><div class="lesson"><strong>Current quotes</strong><p>${backendHealth.liveQuoteProvider || "Not configured"}</p></div><div class="lesson"><strong>History and splits</strong><p>${backendHealth.historicalDataProvider || "Not configured"}</p></div></section><section class="card"><div class="eyebrow">Trading mode</div><h2>Unlimited simulation</h2><p class="muted">There is no starting value. Buys may create negative simulated cash flow, and sells may create short positions. Net P/L is calculated as net cash flow plus the signed market value of all positions.</p></section><section class="card"><div class="eyebrow">Simulation assumptions</div><h2>Simulation settings</h2><div class="form"><div class="field"><label>Commission per order (USD)</label><input id="commission" inputmode="decimal" value="${state.settings.commission}"></div><div class="field"><label>Slippage rate (decimal)</label><input id="slippage" inputmode="decimal" value="${state.settings.slippage}"></div><button id="saveSettings" class="btn">Save settings</button></div></section><section class="card"><div class="eyebrow">AI Coach</div><h2>${backendHealth.aiConfigured ? "OpenAI connected" : "Local mode active"}</h2><p class="muted">Local suggestions work immediately. For optional language-model suggestions, add OPENAI_API_KEY as an encrypted Cloudflare Worker secret. The key stays on the server and is never sent to Safari.</p><p class="muted">Configured model: ${esc(backendHealth.aiModel || "local-rules-v1")}</p></section><section class="card"><div class="eyebrow">Cloud persistence</div><h2>${backendHealth.tradeCount || 0} standalone trade records</h2><p class="muted">Every buy and sell is stored as its own immutable row in Cloudflare D1. Deploying new code does not replace the database or encrypted provider secrets.</p><div class="lesson"><strong>Provider keys</strong><p>${backendHealth.keysPersisted ? "Configured as server-side Cloudflare secrets." : "No provider secrets are configured yet."}</p></div><div class="lesson"><strong>Database</strong><p>${esc(backendHealth.tradeDatabase || "Cloudflare D1")}</p></div><a href="/import" class="btn secondary" style="display:block;text-align:center;text-decoration:none">Import / export data</a><button id="backupNow" class="btn secondary" style="margin-top:8px">Create cloud snapshot</button><button id="reset" class="btn secondary" style="margin-top:8px">Reset interface state only</button></section></div>`;
      }
      function bind() {
        bindPriceHistory();
        bindPerformance();
        bindGenericCharts();
        $("#refreshAll")?.addEventListener("click", refreshAll);
        $("#aiPortfolio")?.addEventListener("click", () => runAI("portfolio"));
        $("#aiSymbol")?.addEventListener("click", () => runAI("symbol"));
        $("#aiQuestion")?.addEventListener("change", (event) => {
          state.aiQuestion = event.target.value;
          save();
        });
        document.querySelectorAll("[data-side]").forEach(
          (b) =>
            (b.onclick = () => {
              state.side = b.dataset.side;
              save();
              render();
            }),
        );
        $("#load")?.addEventListener("click", () => {
          state.symbol = $("#symbol").value.toUpperCase().trim();
          save();
          loadMarket(null, true);
        });
        $("#execute")?.addEventListener("click", () => {
          state.qty = $("#qty").value;
          currentTradeJournal();
          save();
          execute();
        });
        [
          "tradeThesis",
          "expectedHolding",
          "tradeConfidence",
          "targetPrice",
          "invalidationPrice",
          "tradeNotes",
        ].forEach((id) =>
          $("#" + id)?.addEventListener("change", () => {
            currentTradeJournal();
            save();
          }),
        );
        $("#loadBenchmarks")?.addEventListener("click", loadBenchmarks);
        document
          .querySelectorAll("[data-trade-review]")
          .forEach((button) =>
            button.addEventListener("click", () =>
              runTradeReview(button.dataset.tradeReview),
            ),
          );
        $("#boardQty")?.addEventListener("change", (event) => {
          state.boardQty = event.target.value;
          save();
        });
        $("#addBoardSymbol")?.addEventListener("click", () => {
          const symbol = String($("#boardSymbol")?.value || "")
            .toUpperCase()
            .trim()
            .replace(/[^A-Z0-9.:-]/g, "");
          if (!symbol) return message("Enter a valid symbol.");
          state.watchlist = MarketLabTrading.uniqueSymbols([
            ...(state.watchlist || []),
            symbol,
          ]);
          state.symbol = symbol;
          save();
          render();
        });
        document.querySelectorAll("[data-open-symbol]").forEach(
          (b) =>
            (b.onclick = () => {
              state.symbol = b.dataset.openSymbol;
              save();
              render();
            }),
        );
        document
          .querySelectorAll("[data-load-symbol]")
          .forEach((b) => (b.onclick = () => loadMarket(b.dataset.loadSymbol)));
        document.querySelectorAll("[data-remove-symbol]").forEach(
          (b) =>
            (b.onclick = () => {
              state.watchlist = (state.watchlist || []).filter(
                (symbol) => symbol !== b.dataset.removeSymbol,
              );
              save();
              render();
            }),
        );
        document.querySelectorAll("[data-quick-side]").forEach(
          (b) =>
            (b.onclick = () => {
              const qty = Number($("#boardQty")?.value || state.boardQty);
              state.boardQty = String($("#boardQty")?.value || state.boardQty);
              executeFor(b.dataset.symbol, b.dataset.quickSide, qty, null);
            }),
        );
        $("#runWhatIf")?.addEventListener("click", () => {
          state.whatIf = {
            symbol: String($("#whatIfSymbol")?.value || state.symbol)
              .toUpperCase()
              .trim(),
            side: $("#whatIfSide")?.value === "sell" ? "sell" : "buy",
            quantity: String($("#whatIfQty")?.value || "1"),
          };
          save();
          render();
        });
        $("#loadXrayData")?.addEventListener("click", loadXrayData);
        $("#whatIfAI")?.addEventListener("click", () => {
          const simulation = MarketLabInsights.whatIf(state, state.whatIf);
          if (!simulation.valid) return message(simulation.reason);
          state.aiQuestion = `Evaluate this paper-trade scenario using only loaded data: ${simulation.side} ${simulation.quantity} ${simulation.symbol} at ${money(simulation.price)}. Projected concentration ${simulation.concentration.toFixed(1)}%. Discuss risks, missing evidence, and what should invalidate the thesis.`;
          state.tab = "ai";
          save();
          render();
          setTimeout(() => runAI("portfolio"), 0);
        });
        $("#backtest")?.addEventListener("click", backtest);
        $("#addJournal")?.addEventListener("click", () => {
          state.journal.unshift({
            time: new Date().toISOString(),
            title: `${state.symbol} portfolio review`,
            body: `Net simulation P/L ${money(total())}; unrealized P/L ${money(pnl())}. Review long and short exposure, data freshness, and the assumptions behind every trade.`,
          });
          save();
          render();
        });
        $("#saveSettings")?.addEventListener("click", () => {
          state.settings.commission = Math.max(
            0,
            Number($("#commission").value) || 0,
          );
          state.settings.slippage = Math.max(
            0,
            Number($("#slippage").value) || 0,
          );
          save();
          message("Settings saved to the cloud backend.");
        });
        $("#backupNow")?.addEventListener("click", async () => {
          try {
            const result = await api("/api/backup", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: "{}",
            });
            message(
              `Cloud snapshot created · ID ${result.backupId || "saved"}.`,
            );
          } catch (e) {
            message(String(e.message || e));
          }
        });
        $("#reset")?.addEventListener("click", () => {
          state = fresh();
          save();
          render();
          message(
            "Interface state reset. The Cloudflare D1 trade database was preserved.",
          );
        });
        bindLearningActions();
      }
      function bindPerformanceCursor() {
        const canvas = $("#performanceCanvas");
        if (!canvas) return;
        const result = MarketLabPerformance.series(state, {
            range: state.performanceRange,
            symbol: state.performanceSymbol,
          }),
          metric = state.performanceMetric || "balance",
          g = MarketLabPerformance.geometry(result.points, metric, 660, 265, {
            left: 58,
            right: 14,
            top: 18,
            bottom: 34,
          });
        if (g.points.length < 2) return;
        bindCursor(
          canvas,
          g.points,
          660,
          265,
          58,
          14,
          (p) => money(p.value),
          (p) => `${p.day} · ${metric}`,
        );
      }
      function bindCursor(
        canvas,
        points,
        w,
        h,
        leftPad,
        rightPad,
        valueText,
        detailText,
      ) {
        const cross = canvas.querySelector(".chart-crosshair"),
          dot = canvas.querySelector(".chart-dot"),
          tip = canvas.querySelector(".chart-tooltip");
        if (!cross || !dot || !tip || !points.length) return;
        function inspect(event) {
          const rect = canvas.getBoundingClientRect(),
            x = Math.max(0, Math.min(rect.width, event.clientX - rect.left)),
            plotLeft = (leftPad / w) * rect.width,
            plotRight = (rightPad / w) * rect.width,
            plotWidth = Math.max(1, rect.width - plotLeft - plotRight),
            index = Math.max(
              0,
              Math.min(
                points.length - 1,
                Math.round(((x - plotLeft) / plotWidth) * (points.length - 1)),
              ),
            ),
            p = points[index],
            left =
              ((p.x ??
                leftPad +
                  (index / (points.length - 1)) * (w - leftPad - rightPad)) /
                w) *
              rect.width,
            top = ((p.y ?? h / 2) / h) * rect.height;
          cross.style.display = dot.style.display = tip.style.display = "block";
          cross.style.left = `${left}px`;
          dot.style.left = `${left}px`;
          dot.style.top = `${top}px`;
          tip.querySelector("strong").textContent = valueText(p, index);
          tip.querySelector("span").textContent = detailText(p, index);
          tip.style.left = `${Math.max(5, Math.min(rect.width - 150, left + (left > rect.width * 0.65 ? -145 : 10)))}px`;
          tip.style.top = `${Math.max(5, top - 50)}px`;
        }
        canvas.addEventListener("pointerdown", inspect);
        canvas.addEventListener("pointermove", (e) => {
          if (e.pointerType === "mouse" || e.buttons) inspect(e);
        });
      }
      function bindGenericCharts() {
        document.querySelectorAll(".generic-chart").forEach((canvas) => {
          let values = [];
          try {
            values = JSON.parse(
              decodeURIComponent(canvas.dataset.chartValues || ""),
            );
          } catch {}
          if (values.length < 2) return;
          const w = 600,
            h = 150,
            min = Math.min(...values),
            max = Math.max(...values),
            r = max - min || 1,
            points = values.map((value, index) => ({
              value,
              x: (index / (values.length - 1)) * w,
              y: h - 8 - ((value - min) / r) * (h - 16),
            }));
          bindCursor(
            canvas,
            points,
            w,
            h,
            0,
            0,
            (p) => money(p.value),
            (p, i) =>
              `${canvas.dataset.chartLabel || "Chart"} · point ${i + 1} of ${points.length}`,
          );
        });
      }
      function render() {
        renderNav();
        state.settings = { ...fresh().settings, ...(state.settings || {}) };
        const page =
          state.tab === "overview"
            ? overview()
            : state.tab === "performance"
              ? performanceView()
              : state.tab === "trade"
                ? trade()
                : state.tab === "strategy"
                  ? strategy()
                  : state.tab === "research"
                    ? research()
                    : state.tab === "ai"
                      ? aiCoach()
                      : state.tab === "lab"
                        ? lab()
                        : state.tab === "journal"
                          ? journal()
                          : settings();
        const learning =
          state.settings.beginnerMode !== false
            ? `${state.tab === "overview" ? onboardingCard() : ""}${beginnerIntro(state.tab)}`
            : "";
        $("#view").innerHTML = `<div class="stack">${learning}</div>${page}`;
        bind();
        decorateBeginnerTerms();
        bindLearningActions();
      }
      if ("serviceWorker" in navigator) navigator.serviceWorker.register("/service-worker.js").catch(() => {});
      boot();
    </script>
  </body>
</html>
